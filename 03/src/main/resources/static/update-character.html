<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Update Character</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        /* reuse create form styles */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background-color:#f0e6ef; font-family:'Optima','Segoe UI',sans-serif; color:#4a3f5c; line-height:1.6; }
        .navbar-custom { background: linear-gradient(135deg, #9c89b8, #b8bedd) !important; box-shadow: 0 4px 20px rgba(156,137,184,0.25); padding:0.8rem 0; }
        .navbar-custom .navbar-brand { color:#2d1f3a !important; font-weight:700; font-size:1.4rem; }
        .navbar-custom .navbar-brand i { color:#f0a6ca; font-size:1.6rem; }
        .navbar-custom .nav-link { color:#2d1f3a !important; font-weight:500; padding:0.5rem 1.2rem !important; border-radius:50px; transition:all 0.25s ease; }
        .navbar-custom .nav-link:hover, .navbar-custom .nav-link.active { background-color:rgba(240,166,202,0.4); transform:scale(1.02); }
        .navbar-custom .nav-link i { margin-right:6px; }
        .form-hero { background:linear-gradient(135deg,#efc3e6 0%,#f0e6ef 50%,#b8bedd 100%); padding:3.5rem 0 3rem; border-radius:0 0 3.5rem 3.5rem; margin-bottom:3rem; box-shadow:0 8px 28px rgba(156,137,184,0.15); }
        .form-hero h1 { font-weight:800; color:#2d1f3a; }
        .form-hero h1 i { color:#f0a6ca; }
        .form-hero .lead { color:#4a3f5c; max-width:600px; margin:0 auto; }
        .form-card { background:#ffffff; border-radius:2rem; padding:2.5rem 3rem; box-shadow:0 8px 32px rgba(156,137,184,0.08); border:1px solid #efc3e6; max-width:800px; margin:0 auto; }
        .form-card label { font-weight:600; color:#2d1f3a; margin-bottom:0.3rem; }
        .form-card label .required-star { color:#f0a6ca; margin-left:2px; }
        .form-card .form-control { border-radius:0.75rem; border:2px solid #e8dcec; padding:0.7rem 1.2rem; background-color:#fcf9fc; color:#4a3f5c; }
        .form-card .form-control:focus { border-color:#f0a6ca; box-shadow:0 0 0 4px rgba(240,166,202,0.2); background-color:#ffffff; }
        .form-card .btn-submit { background:linear-gradient(135deg,#f0a6ca,#efc3e6); color:#2d1f3a; font-weight:700; padding:0.8rem 3rem; border-radius:50px; border:none; font-size:1.05rem; transition:all 0.3s ease; box-shadow:0 4px 16px rgba(240,166,202,0.3); }
        .form-card .btn-submit:hover { transform:scale(1.04); box-shadow:0 8px 28px rgba(240,166,202,0.4); background:linear-gradient(135deg,#efc3e6,#f0a6ca); }
        .form-card .btn-reset { background:transparent; color:#9c89b8; border:2px solid #e8dcec; font-weight:600; padding:0.8rem 2rem; border-radius:50px; transition:all 0.25s ease; }
        .form-card .btn-reset:hover { background:#f0e6ef; border-color:#b8bedd; color:#4a3f5c; }
        .footer { background:linear-gradient(135deg,#9c89b8,#b8bedd); color:#2d1f3a; padding:2rem 0; margin-top:4rem; border-radius:3rem 3rem 0 0; box-shadow:0 -4px 24px rgba(156,137,184,0.15); }
        .footer a { color:#2d1f3a; font-weight:500; text-decoration:none; }
        .footer a:hover { color:#f0a6ca; text-decoration:underline; }
        .footer small { opacity:0.7; font-size:0.85rem; }
        @media (max-width:768px) { .form-hero { padding:2.5rem 0 2rem; } .form-card { padding:1.5rem; margin:0 0.5rem; } .form-card .btn-submit, .form-card .btn-reset { width:100%; margin-bottom:0.5rem; } }
    </style>
</head>
<body>

    <!-- NAVIGATION -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/index.html"><i class="fa-solid fa-mug-hot"></i> Character Gallery</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                    aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="/index.html"><i class="fas fa-home"></i>Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about.html"><i class="fas fa-info-circle"></i>About</a></li>
                    <li class="nav-item"><a class="nav-link" href="/new-character-form.html"><i class="fas fa-plus-circle"></i>Add a Character</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="form-hero">
        <div class="container text-center">
            <h1 class="display-4 fw-bold"><i class="fas fa-edit me-2"></i>Update Character</h1>
            <p class="lead" id="updateSubtitle">Loading...</p>
        </div>
    </section>

    <!-- FORM -->
    <div class="container">
        <div class="form-card">
            <form id="updateForm">
                <input type="hidden" id="charId" name="characterId" />
                <div class="row g-4">
                    <div class="col-md-6">
                        <label for="name" class="form-label">Name <span class="required-star">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" required />
                    </div>
                    <div class="col-md-6">
                        <label for="universe" class="form-label">Universe <span class="required-star">*</span></label>
                        <input type="text" class="form-control" id="universe" name="universe" required />
                    </div>
                </div>
                <div class="row g-4 mt-2">
                    <div class="col-md-6">
                        <label for="power" class="form-label">Power</label>
                        <input type="text" class="form-control" id="power" name="power" />
                    </div>
                    <div class="col-md-6">
                        <label for="age" class="form-label">Age</label>
                        <input type="number" class="form-control" id="age" name="age" />
                    </div>
                </div>
                <div class="mt-4">
                    <label for="activeDate" class="form-label">Active Date</label>
                    <input type="date" class="form-control" id="activeDate" name="activeDate" />
                </div>
                <div class="mt-4">
                    <label for="description" class="form-label">Description <span class="required-star">*</span></label>
                    <textarea class="form-control" id="description" name="description" rows="4" required></textarea>
                </div>
                <div class="mt-5 d-flex flex-wrap gap-3 justify-content-center">
                    <button type="submit" class="btn btn-submit"><i class="fas fa-save"></i> Update</button>
                    <a href="#" id="cancelLink" class="btn btn-reset"><i class="fas fa-times"></i> Cancel</a>
                </div>
            </form>
            <div id="formMessage" class="mt-3 text-center"></div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container text-center">
            <p class="mb-1"><i class="fas fa-mug-hot me-2"></i> Character Gallery &bull; <a href="/about.html">About</a> &bull; <a href="/new-character-form.html">Add a Character</a></p>
            <small>CSC 340 Assignment!</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const charId = urlParams.get('id');
        if (!charId) {
            document.querySelector('.container').innerHTML = '<p class="text-danger">No ID.</p>';
            throw new Error('No ID');
        }

        async function loadCharacter() {
            try {
                const res = await fetch(`/api/characters/${charId}`);
                if (!res.ok) throw new Error('Not found');
                const c = await res.json();
                document.getElementById('charId').value = c.characterId;
                document.getElementById('name').value = c.name;
                document.getElementById('universe').value = c.universe || '';
                document.getElementById('power').value = c.power || '';
                document.getElementById('age').value = c.age || 0;
                document.getElementById('activeDate').value = c.activeDate || '';
                document.getElementById('description').value = c.description || '';
                document.getElementById('updateSubtitle').textContent = `Editing ${c.name}`;
                document.getElementById('cancelLink').href = `details.html?id=${c.characterId}`;
            } catch (e) {
                console.error(e);
                document.querySelector('.form-card').innerHTML = '<p class="text-danger">Error loading character.</p>';
            }
        }

        document.getElementById('updateForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const activeDate = formData.get('activeDate');
            const character = {
                name: formData.get('name'),
                universe: formData.get('universe'),
                power: formData.get('power'),
                age: parseInt(formData.get('age')) || 0,
                activeDate: activeDate ? activeDate : null,
                description: formData.get('description')
            };
            const id = document.getElementById('charId').value;

            try {
                const res = await fetch(`/api/characters/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(character)
                });
                if (res.ok) {
                    alert('Updated!');
                    window.location.href = `details.html?id=${id}`;
                } else {
                    const err = await res.text();
                    document.getElementById('formMessage').innerHTML = `<span class="text-danger">Error: ${err}</span>`;
                    console.error(err);
                }
            } catch (e) {
                console.error(e);
                document.getElementById('formMessage').innerHTML = `<span class="text-danger">Network error.</span>`;
            }
        });

        document.addEventListener('DOMContentLoaded', loadCharacter);
    </script>
</body>
</html>
