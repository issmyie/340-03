<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="pageTitle">Character Details</title>
    <!-- Bootstrap & Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <style>
        /* Copy your details.css styles here (or keep in /css/style.css) */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background-color:#f1fffa; font-family:'Optima','Segoe UI',sans-serif; color:#464e47; line-height:1.6; }
        .navbar-custom { background: linear-gradient(135deg, #96e6b3, #568259) !important; box-shadow: 0 4px 20px rgba(86,130,89,0.25); padding:0.8rem 0; }
        .navbar-custom .navbar-brand { color:#f1fffa !important; font-weight:700; font-size:1.4rem; }
        .navbar-custom .navbar-brand i { color:#ccfccb; font-size:1.6rem; }
        .navbar-custom .nav-link { color:#f1fffa !important; font-weight:500; padding:0.5rem 1.2rem !important; border-radius:50px; transition:all 0.25s ease; }
        .navbar-custom .nav-link:hover, .navbar-custom .nav-link.active { background-color:rgba(204,252,203,0.3); transform:scale(1.02); }
        .navbar-custom .nav-link i { margin-right:6px; }
        .details-hero { background:linear-gradient(135deg,#ccfccb 0%,#f1fffa 50%,#96e6b3 100%); padding:3rem 0 2.5rem; border-radius:0 0 3.5rem 3.5rem; margin-bottom:2.5rem; box-shadow:0 8px 28px rgba(86,130,89,0.15); }
        .details-hero h1 { font-weight:800; color:#464e47; }
        .details-hero h1 i { color:#568259; }
        .details-hero .breadcrumb-nav a { color:#464e47; text-decoration:none; font-weight:500; }
        .details-hero .breadcrumb-nav a:hover { color:#568259; text-decoration:underline; }
        .badge-role { background:#568259; color:#f1fffa; padding:0.3rem 1.2rem; border-radius:50px; font-weight:600; }
        .badge-role i { color:#ccfccb; }
        .details-img { border-radius:2rem; box-shadow:0 16px 48px rgba(86,130,89,0.2); width:100%; max-height:450px; object-fit:cover; border:4px solid #f1fffa; }
        .info-card { background:#f1fffa; border-radius:2rem; padding:2rem 2.25rem; box-shadow:0 8px 32px rgba(86,130,89,0.08); height:100%; border:1px solid #ccfccb; }
        .info-card .detail-label { font-weight:700; color:#568259; text-transform:uppercase; letter-spacing:0.5px; font-size:0.8rem; }
        .info-card .detail-value { font-weight:600; color:#464e47; font-size:1.1rem; }
        .info-card .divider { border-top:2px dashed #96e6b3; margin:1rem 0; }
        .section-title { font-weight:700; color:#464e47; border-left:6px solid #568259; padding-left:1rem; margin-bottom:1.2rem; }
        .backstory-box { background:#f1fffa; border-radius:1.5rem; padding:1.8rem 2rem; border-left:6px solid #96e6b3; box-shadow:0 4px 16px rgba(86,130,89,0.06); border:1px solid #ccfccb; }
        .footer { background:linear-gradient(135deg,#96e6b3,#568259); color:#f1fffa; padding:2rem 0; margin-top:4rem; border-radius:3rem 3rem 0 0; box-shadow:0 -4px 24px rgba(86,130,89,0.15); }
        .footer a { color:#f1fffa; font-weight:500; text-decoration:none; }
        .footer a:hover { color:#ccfccb; text-decoration:underline; }
        .footer small { opacity:0.8; font-size:0.85rem; }
        @media (max-width:768px) { .details-hero { padding:2rem 0 1.5rem; border-radius:0 0 2rem 2rem; } .info-card { padding:1.5rem; } .backstory-box { padding:1.2rem; } .details-img { max-height:280px; } }
    </style>
</head>
<body>

    <!-- ===== NAVIGATION ===== -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/index.html">
                <i class="fa-solid fa-mug-hot"></i> Character Gallery
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                    aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="/index.html"><i class="fas fa-home"></i>Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about.html"><i class="fas fa-info-circle"></i>About</a></li>
                    <li class="nav-item"><a class="nav-link" href="/new-character-form.html"><i class="fas fa-plus-circle"></i>Add a Character</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ===== DETAILS HERO ===== -->
    <section class="details-hero">
        <div class="container">
            <div class="breadcrumb-nav mb-2">
                <a href="/index.html"><i class="fas fa-arrow-left me-1"></i>Back to Gallery</a>
                <span class="mx-2 text-muted">/</span>
                <span class="text-muted" id="breadcrumbName">Character</span>
            </div>
            <h1 class="display-5 fw-bold">
                <i class="fas fa-paw me-2"></i><span id="charName">Loading...</span>
            </h1>
            <p class="lead mb-0" style="color: #464e47;">
                <i class="fas fa-globe me-1" style="color: #568259;"></i> <span id="charUniverse">-</span>
                <span class="mx-2">•</span>
                <span class="badge-role"><i class="fas fa-shield-alt me-1"></i><span id="charPower">-</span></span>
            </p>
        </div>
    </section>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="container">
        <div class="row g-4">
            <!-- Image column -->
            <div class="col-lg-6">
                <img id="charImage" src="" class="details-img" alt="Character" />
                <div class="mt-3 text-center text-muted small">
                    <i class="fas fa-camera me-1"></i> <span id="charNameImage">-</span>
                </div>
            </div>
            <!-- Info card -->
            <div class="col-lg-6">
                <div class="info-card" id="infoCard">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <span class="detail-label">Full Name</span>
                            <div class="detail-value" id="charNameInfo">-</div>
                        </div>
                        <span class="badge" style="background:#568259; color:#f1fffa; font-size:0.85rem; padding:0.4rem 1rem; border-radius:50px;">
                            <i class="fas fa-bolt me-1"></i> Age: <span id="charAge">-</span>
                        </span>
                    </div>
                    <div class="divider"></div>
                    <div class="row g-3">
                        <div class="col-6">
                            <span class="detail-label"><i class="fas fa-tag me-1"></i>Universe</span>
                            <div class="detail-value" id="charUniverseInfo">-</div>
                        </div>
                        <div class="col-6">
                            <span class="detail-label"><i class="fas fa-calendar-alt me-1"></i>Active Date</span>
                            <div class="detail-value" id="charActiveDate">-</div>
                        </div>
                        <div class="col-6">
                            <span class="detail-label"><i class="fas fa-globe me-1"></i>Power</span>
                            <div class="detail-value" id="charPowerInfo">-</div>
                        </div>
                        <div class="col-6">
                            <span class="detail-label"><i class="fas fa-paw me-1"></i>Age</span>
                            <div class="detail-value" id="charAgeInfo">-</div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Description -->
            <div class="col-12 mt-4">
                <h3 class="section-title"><i class="fas fa-book-open me-2" style="color:#568259;"></i>Description</h3>
                <div class="backstory-box">
                    <p id="charDescription">-</p>
                </div>
            </div>
            <!-- Action buttons -->
            <div class="col-12 mt-3 text-center">
                <a id="updateLink" href="#" class="btn btn-warning me-2"><i class="fas fa-edit"></i> Update</a>
                <button id="deleteBtn" class="btn btn-danger"><i class="fas fa-trash"></i> Delete</button>
                <a href="/index.html" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back to List</a>
            </div>
        </div>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="container text-center">
            <p class="mb-1">
                <i class="fas fa-mug-hot me-2"></i>
                Character Gallery &bull;
                <a href="/about.html">About</a> &bull;
                <a href="/new-character-form.html">Add a Character</a>
            </p>
            <small>CSC 340 Assignment!</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"></script>

    <script>
        // Get character ID from URL query parameter
        const urlParams = new URLSearchParams(window.location.search);
        const charId = urlParams.get('id');
        if (!charId) {
            document.querySelector('.container').innerHTML = '<p class="text-danger">No character ID provided.</p>';
            throw new Error('No ID');
        }

        // Delete function
        async function deleteCharacter(id) {
            if (!confirm('Are you sure you want to delete this character?')) return;
            try {
                const response = await fetch(`/api/characters/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    alert('Character deleted!');
                    window.location.href = '/index.html';
                } else {
                    alert('Failed to delete character.');
                }
            } catch (error) {
                console.error('Delete error:', error);
                alert('An error occurred.');
            }
        }

        // Load details
        async function loadCharacterDetails() {
            try {
                const response = await fetch(`/api/characters/${charId}`);
                if (!response.ok) {
                    if (response.status === 404) throw new Error('Character not found');
                    throw new Error('Failed to fetch');
                }
                const character = await response.json();

                // Populate all elements
                document.title = character.name + ' — Character Details';
                document.getElementById('pageTitle').textContent = character.name + ' — Character Details';
                document.getElementById('breadcrumbName').textContent = character.name;
                document.getElementById('charName').textContent = character.name;
                document.getElementById('charUniverse').textContent = character.universe || '-';
                document.getElementById('charPower').textContent = character.power || '-';
                document.getElementById('charNameImage').textContent = character.name;
                document.getElementById('charNameInfo').textContent = character.name;
                document.getElementById('charAge').textContent = character.age;
                document.getElementById('charUniverseInfo').textContent = character.universe || '-';
                document.getElementById('charActiveDate').textContent = character.activeDate || '-';
                document.getElementById('charPowerInfo').textContent = character.power || '-';
                document.getElementById('charAgeInfo').textContent = character.age;
                document.getElementById('charDescription').textContent = character.description || 'No description provided.';

                // Image (fallback)
                const img = document.getElementById('charImage');
                img.src = `/images/${character.name.toLowerCase()}.jpeg`;
                img.onerror = function() { this.src = '/images/default.jpg'; };

                // Update link
                document.getElementById('updateLink').href = `update-character.html?id=${character.characterId}`;
                // Delete button
                document.getElementById('deleteBtn').onclick = function() { deleteCharacter(character.characterId); };

            } catch (error) {
                console.error('Error loading character details:', error);
                document.querySelector('.container').innerHTML = '<p class="text-danger">Error loading character details.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadCharacterDetails);
    </script>
</body>
</html>
