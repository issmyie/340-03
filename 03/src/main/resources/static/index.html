<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Character Gallery</title>
    <!-- Bootstrap & Font Awesome (same as before) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <!-- Your custom CSS (if any) -->
    <link rel="stylesheet" href="/css/style.css" />
    <style>
        /* Copy your existing CSS here (or keep it in /css/style.css) */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background-color:#f0e6ef; font-family:'Optima','Segoe UI',sans-serif; color:#4a3f5c; line-height:1.6; }
        .navbar-custom { background: linear-gradient(135deg, #9c89b8, #b8bedd) !important; box-shadow: 0 4px 20px rgba(156,137,184,0.25); padding:0.8rem 0; }
        .navbar-custom .navbar-brand { color:#2d1f3a !important; font-weight:700; font-size:1.4rem; }
        .navbar-custom .navbar-brand i { color:#f0a6ca; font-size:1.6rem; }
        .navbar-custom .nav-link { color:#2d1f3a !important; font-weight:500; padding:0.5rem 1.2rem !important; border-radius:50px; transition:all 0.25s ease; }
        .navbar-custom .nav-link:hover, .navbar-custom .nav-link.active { background-color:rgba(240,166,202,0.4); transform:scale(1.02); }
        .navbar-custom .nav-link i { margin-right:6px; }
        .hero { background:linear-gradient(135deg,#9c89b8 0%,#b8bedd 50%,#efc3e6 100%); padding:4rem 0 3.5rem; border-radius:0 0 3.5rem 3.5rem; margin-bottom:3rem; box-shadow:0 8px 32px rgba(156,137,184,0.2); }
        .hero h1 { font-weight:800; color:#2d1f3a; }
        .hero h1 i { color:#f0a6ca; }
        .hero .lead { color:#4a3f5c; max-width:600px; margin:0 auto; }
        .search-wrapper { max-width:520px; margin:0 auto; }
        .search-wrapper .form-control { border-radius:50px 0 0 50px; border:2px solid #efc3e6; padding:0.7rem 1.4rem; background:#fff; }
        .search-wrapper .btn { border-radius:0 50px 50px 0; padding:0.7rem 2rem; background:#f0a6ca; color:#2d1f3a; font-weight:600; border:2px solid #f0a6ca; }
        .search-wrapper .btn:hover { background:#efc3e6; border-color:#efc3e6; }
        .character-card { border:none; border-radius:1.5rem; overflow:hidden; background:#ffffff; box-shadow:0 8px 28px rgba(156,137,184,0.12); transition:all 0.35s cubic-bezier(0.25,0.46,0.45,0.94); height:100%; }
        .character-card:hover { transform:translateY(-12px); box-shadow:0 20px 50px rgba(156,137,184,0.22); }
        .character-card .card-img-top { height:220px; object-fit:cover; background:#f0e6ef; border-bottom:4px solid #efc3e6; }
        .character-card .card-body { padding:1.5rem 1.5rem 1.25rem; }
        .character-card .card-title { font-weight:700; font-size:1.25rem; color:#2d1f3a; margin-bottom:0.15rem; }
        .character-card .card-subtitle { font-size:0.85rem; color:#9c89b8; font-weight:500; }
        .character-card .badge-role { background:#f0e6ef; color:#4a3f5c; font-weight:600; padding:0.3rem 1rem; border-radius:50px; font-size:0.7rem; letter-spacing:0.3px; }
        .character-card .card-text { font-size:0.92rem; color:#5a4f6e; margin-top:0.7rem; line-height:1.5; }
        .character-card .power-badge { background:#efc3e6; color:#2d1f3a; font-weight:600; padding:0.3rem 1rem; border-radius:50px; font-size:0.75rem; }
        .character-card .btn-details { border-radius:50px; font-weight:600; font-size:0.8rem; padding:0.4rem 1.6rem; border:2px solid #9c89b8; color:#4a3f5c; background:transparent; transition:all 0.25s ease; }
        .character-card .btn-details:hover { background:#9c89b8; color:#fff; border-color:#9c89b8; transform:scale(1.04); }
        .footer { background:linear-gradient(135deg,#9c89b8,#b8bedd); color:#2d1f3a; padding:2rem 0; margin-top:4rem; border-radius:3rem 3rem 0 0; box-shadow:0 -4px 24px rgba(156,137,184,0.15); }
        .footer a { color:#2d1f3a; font-weight:500; text-decoration:none; }
        .footer a:hover { color:#f0a6ca; text-decoration:underline; }
        .footer small { opacity:0.7; font-size:0.85rem; }
        @media (max-width:576px) { .hero h1 { font-size:1.8rem; } .hero { padding:2.5rem 0 2rem; border-radius:0 0 2rem 2rem; } .navbar-custom .navbar-brand { font-size:1.1rem; } .character-card .card-img-top { height:170px; } }
        .text-palette-primary { color:#9c89b8; }
        .text-palette-secondary { color:#f0a6ca; }
        .text-palette-dark { color:#2d1f3a; }
        .bg-palette-light { background-color:#f0e6ef; }
    </style>
</head>
<body>

    <!-- ===== NAVIGATION ===== -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/index.html">
                <i class="fa-solid fa-mug-hot"></i> Character Gallery
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                    aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="/index.html"><i class="fas fa-home"></i>Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about.html"><i class="fas fa-info-circle"></i>About</a></li>
                    <li class="nav-item"><a class="nav-link" href="/new-character-form.html"><i class="fas fa-plus-circle"></i>Add a Character</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ===== HERO ===== -->
    <section class="hero">
        <div class="container text-center">
            <h1 class="display-4 fw-bold">Fictional Character Gallery</h1>
            <p class="lead">Explore The Best Characters</p>

            <!-- Search Form (extra credit) -->
            <div class="search-wrapper mt-4">
                <form id="searchForm" class="d-flex">
                    <input class="form-control" type="search" id="searchInput" placeholder="Search by name…" aria-label="Search" />
                    <button class="btn" type="submit"><i class="fas fa-search me-1"></i>Search</button>
                </form>
            </div>

            <div class="mt-3">
                <a href="#" class="btn btn-outline-secondary btn-sm m-1" data-category="universe" data-value="Kitty">kitty</a>
                <a href="#" class="btn btn-outline-secondary btn-sm m-1" data-category="universe" data-value="Bunny">bunny</a>
                <a href="#" class="btn btn-outline-secondary btn-sm m-1" data-category="power" data-value="Super Strength">Super Strength</a>
                <a href="#" class="btn btn-outline-secondary btn-sm m-1" data-category="power" data-value="Magic">Magic</a>
            </div>
        </div>
    </section>

    <!-- ===== CHARACTER GRID ===== -->
    <div class="container">
        <div class="row g-4" id="characterContainer">
            <!-- cards will be injected by JavaScript -->
        </div>
        <div class="text-center mt-4">
            <a href="/new-character-form.html" class="btn btn-primary"><i class="fas fa-plus"></i> Create New Character</a>
        </div>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="container text-center">
            <p class="mb-1">
                <i class="fas fa-mug-hot me-2"></i>
                Character Gallery &bull;
                <a href="/about.html">About</a> &bull;
                <a href="/new-character-form.html">Add a Character</a>
            </p>
            <small>CSC 340 Assignment!</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"></script>

    <script>
        // ----- Helper: render character cards -----
        function renderCharacters(characters) {
            const container = document.getElementById('characterContainer');
            container.innerHTML = ''; // clear
            if (!characters || characters.length === 0) {
                container.innerHTML = '<p class="text-center w-100">No characters found.</p>';
                return;
            }
            characters.forEach(character => {
                const col = document.createElement('div');
                col.className = 'col-sm-6 col-lg-4 col-xl-3';
                col.innerHTML = `
                    <div class="card character-card">
                        <img src="/images/${character.name.toLowerCase()}.jpeg" 
                             class="card-img-top" 
                             alt="${character.name}"
                             onerror="this.src='/images/default.jpg'" />
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">${character.name}</h5>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="card-subtitle"><i class="fas fa-globe me-1"></i>${character.universe || ''}</span>
                                <span class="badge-role"><i class="fas fa-shield-alt me-1"></i>${character.power || ''}</span>
                            </div>
                            <p class="card-text">${character.description || ''}</p>
                            <div class="mt-auto pt-2 d-flex justify-content-between align-items-center">
                                <span class="power-badge"><i class="fas fa-bolt me-1"></i>Age: ${character.age}</span>
                                <a href="details.html?id=${character.characterId}" class="btn btn-details">View Details</a>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(col);
            });
        }

        // ----- Load all characters -----
        async function loadAllCharacters() {
            try {
                const response = await fetch('/api/characters');
                if (!response.ok) throw new Error('Failed to fetch characters');
                const data = await response.json();
                renderCharacters(data);
            } catch (error) {
                console.error('Error loading characters:', error);
                document.getElementById('characterContainer').innerHTML = '<p class="text-center text-danger">Error loading characters.</p>';
            }
        }

        // ----- Search -----
        document.getElementById('searchForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('searchInput').value.trim();
            if (!name) {
                loadAllCharacters();
                return;
            }
            try {
                const response = await fetch(`/api/characters/search?name=${encodeURIComponent(name)}`);
                if (!response.ok) throw new Error('Search failed');
                const data = await response.json();
                renderCharacters(data);
            } catch (error) {
                console.error('Search error:', error);
            }
        });

        // ----- Category filter (extra credit) -----
        document.querySelectorAll('[data-category]').forEach(link => {
            link.addEventListener('click', async function(e) {
                e.preventDefault();
                const category = this.dataset.category;
                const value = this.dataset.value;
                try {
                    const response = await fetch(`/api/characters/category?category=${category}&value=${encodeURIComponent(value)}`);
                    if (!response.ok) throw new Error('Category filter failed');
                    const data = await response.json();
                    renderCharacters(data);
                } catch (error) {
                    console.error('Category filter error:', error);
                }
            });
        });

        // ----- On page load -----
        document.addEventListener('DOMContentLoaded', loadAllCharacters);
    </script>
</body>
</html>
